<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finora Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        
        <div class="sidebar">
            <h2>Finora</h2>

            <ul>
                <li>Dashboard</li>
                <li>Expenses</li>
                <li>Budget</li>
                <li>Reports</li>
                <li>Settings</li>
            </ul>
        </div>
        
        <div class="main-content">
            <h2>Dashboard</h2>
           <div class="cards"> 

               <div class="card">
               <h3>Income</h3>
               <p>1200€</p>
               </div>
               
               <div class="card">
                <h3>Expenses</h3>
                <p>580€</p>
                </div>
                
                  
               <div class="card">
                <h3>Remaining Balance</h3>
                <p>620€</p>
                </div>
           </div>

           <div class="dashboard-section">
                <div class="section-box">
                    <h2>Spending categories</h2>

                    <ul>
                        <li>Food - 200€</li>
                        <li>Transport - 63€</li>
                        <li>Entertainment - 140€</li>
                    </ul>
                </div>
                
                <div class="section-box">
                    <h2>Recent Transactions</h2>

                    <ul>
                      <li>Grocery Store - 25€</li>
                      <li>bUS Ticket - 10€</li>
                    </ul>
                </div>
           </div>
            

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
